name: Monitorar viagens

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar viagens monitoradas
        run: |
          curl --fail --silent --show-error --max-time 120 \
            -X POST "https://alerta-viagem-pro.vercel.app/api/monitor-trips"
